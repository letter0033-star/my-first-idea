<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <meta name="description" content="나의 첫 번째 아이디어를 기록하고 시각화하는 프리미엄 웹페이지입니다.">
    <!-- Google Fonts: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
    <!-- Ambient Background Glows -->
    <div class="glow-1" aria-hidden="true"></div>
    <div class="glow-2" aria-hidden="true"></div>

    <!-- Main Container -->
    <main>
        <div class="card" id="idea-card" onclick="createRipple(event)">
            <div class="sparkle-container">
                <div class="sparkle sparkle-1" aria-hidden="true"></div>
                <div class="sparkle sparkle-2" aria-hidden="true"></div>
                <h1 id="main-heading">오늘도 힘내세요!</h1>
            </div>
            <p id="sub-text">당신의 소중한 하루가 기분 좋은 일로 가득하기를...</p>
            <button id="cheer-btn" class="action-btn" onclick="triggerCheer(event)">한 번 더 힘내기</button>
        </div>
    </main>

    <!-- Interactive Script -->
    <script>
        function createRipple(event) {
            const card = document.getElementById('idea-card');
            
            // Create ripple element
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            
            // Position ripple
            const rect = card.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            
            card.appendChild(ripple);
            
            // Remove ripple after animation finishes
            setTimeout(() => {
                ripple.remove();
            }, 600);

            // Trigger a beautiful color shift or visual effect
            const heading = document.getElementById('main-heading');
            heading.style.transform = 'scale(1.05)';
            setTimeout(() => {
                heading.style.transform = 'scale(1)';
            }, 200);

            // Generate floating particle effects
            createParticles(event.clientX, event.clientY);
        }

        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 충분히 잘하고 있어.",
            "오늘도 누군가에게 좋은 영향을 주고 있다.",
            "힘든 날도 지나간다. 좋은 날도 반드시 온다.",
            "혼자가 아니다. 함께 응원하는 사람들이 있다.",
            "동료들도 당신의 노력을 알고 있다.",
            "당신을 믿는 사람이 생각보다 많다.",
            "누군가는 오늘도 당신 덕분에 웃고 있다.",
            "지금까지 버텨온 당신이 가장 대단하다.",
            "웃으며 시작하면 좋은 일이 따라온다.",
            "오늘 당신 덕분에, 아이가 조금 더 자랐어요.",
            "지친 만큼, 사랑한 거예요.",
            "애썼어요, 오늘의 당신.",
            "보이지 않아도, 다 남아 있어요.",
            "당신의 하루가 누군가의 봄이었어요.",
            "오늘은 그냥, 쉬어도 돼요.",
            "참 잘 견뎠어요, 오늘도.",
            "그 마음, 헛되지 않았어요.",
            "최선을 다한 하루, 수고했어요.",
            "내일은 조금 더 가볍게, 오늘은 푹 쉬어요.",
            "아이들은 몰라도, 나는 알아요.",
            "당신의 인내가 오늘의 기적이에요.",
            "작은 손 하나하나에 마음을 다했죠.",
            "지쳐도, 포기하지 않았잖아요.",
            "오늘의 웃음, 진심이었어요.",
            "그 자리에 있어줘서 고마워요.",
            "아무나 할 수 없는 일을 해냈어요.",
            "당신도 오늘 하루, 안아줄게요.",
            "애쓴 만큼, 예쁜 하루였어요.",
            "오늘 하루도, 참 따뜻했어요.",
            "오늘 하루, 당신은 별이었어요.",
            "지친 어깨 위에 박수를 보내요.",
            "그 목소리, 오늘도 누군가를 살렸어요.",
            "힘들었지? 그래도 멋있었어.",
            "오늘의 당신, 참 눈부셨어요.",
            "아이들 웃음 뒤엔 당신의 인내가 있죠.",
            "매일이 도전이지만, 매일 이겨내고 있어요.",
            "오늘도 세상 하나를 키워냈어요.",
            "당신 없인 안 되는 하루였어요.",
            "지금 이 순간, 참 잘하고 있어요.",
            "오늘의 땀방울, 다 빛이 될 거예요.",
            "조용히, 그러나 확실히 세상을 바꿨어요.",
            "당신의 하루가 곧 내일의 씨앗이에요.",
            "힘든 티도 못 내고, 참 애썼어요.",
            "그 마음, 아이들도 언젠가 알아줄 거예요.",
            "오늘 하루, 당신이 주인공이었어요.",
            "지쳤다는 건, 최선을 다했다는 뜻이죠.",
            "조금 쉬어도, 당신은 여전히 좋은 선생님이에요.",
            "오늘도 누군가의 하루를 밝혔어요.",
            "애쓴 당신에게, 박수를 보냅니다."
        ];

        let lastIndex = 0; // Starts with "오늘도 힘내세요!" (index 0)

        const buttonGradients = [
            { base: "linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)", hover: "linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)" }, // Blue
            { base: "linear-gradient(135deg, #0d9488 0%, #0f766e 100%)", hover: "linear-gradient(135deg, #14b8a6 0%, #0d9488 100%)" }, // Teal
            { base: "linear-gradient(135deg, #4f46e5 0%, #3730a3 100%)", hover: "linear-gradient(135deg, #6366f1 0%, #4f46e5 100%)" }, // Indigo
            { base: "linear-gradient(135deg, #db2777 0%, #9d174d 100%)", hover: "linear-gradient(135deg, #ec4899 0%, #db2777 100%)" }, // Pink
            { base: "linear-gradient(135deg, #0284c7 0%, #075985 100%)", hover: "linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%)" }, // Sky
            { base: "linear-gradient(135deg, #ea580c 0%, #9a3412 100%)", hover: "linear-gradient(135deg, #f97316 0%, #ea580c 100%)" }, // Orange
            { base: "linear-gradient(135deg, #16a34a 0%, #166534 100%)", hover: "linear-gradient(135deg, #22c55e 0%, #16a34a 100%)" }  // Green
        ];
        let lastColorIndex = 0;

        // Test mode auto-activation (for verification screenshots)
        if (window.location.search.includes('test=true')) {
            window.addEventListener('DOMContentLoaded', () => {
                const heading = document.getElementById('main-heading');
                // Use index 47 to verify new sentence rendering
                heading.textContent = sentences[47];
                
                // Force select Teal (index 1) in test mode to verify button color updates properly
                const btn = document.getElementById('cheer-btn');
                btn.style.setProperty('--btn-gradient', buttonGradients[1].base);
                btn.style.setProperty('--btn-gradient-hover', buttonGradients[1].hover);
            });
        }

        function triggerCheer(event) {
            event.stopPropagation(); // Prevent event bubbling to card
            
            const btn = document.getElementById('cheer-btn');
            const heading = document.getElementById('main-heading');
            
            // Button bounce effect
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 100);
            
            // Position for particle bursts
            const rect = btn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            createParticles(x, y);
            setTimeout(() => createParticles(x, y), 80);

            // Change button color
            let nextColorIndex;
            do {
                nextColorIndex = Math.floor(Math.random() * buttonGradients.length);
            } while (nextColorIndex === lastColorIndex);
            
            lastColorIndex = nextColorIndex;
            const nextColors = buttonGradients[nextColorIndex];
            btn.style.setProperty('--btn-gradient', nextColors.base);
            btn.style.setProperty('--btn-gradient-hover', nextColors.hover);

            // Change sentence with a smooth fade transition
            heading.classList.add('fade-out');
            
            setTimeout(() => {
                let nextIndex;
                do {
                    nextIndex = Math.floor(Math.random() * sentences.length);
                } while (nextIndex === lastIndex);
                
                lastIndex = nextIndex;
                heading.textContent = sentences[nextIndex];
                heading.classList.remove('fade-out');
            }, 200);
        }

        function createParticles(x, y) {
            const colors = ['#60a5fa', '#3b82f6', '#0ea5e9', '#06b6d4', '#ffd700'];
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.width = `${Math.random() * 8 + 4}px`;
                particle.style.height = particle.style.width;
                particle.style.borderRadius = '50%';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '999';
                
                // Random destination direction
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 80 + 40;
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity - 20; // pull slightly upwards

                document.body.appendChild(particle);

                // Animate via JS keyframes/transitions
                particle.animate([
                    { transform: 'translate(-50%, -50%) translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(-50%, -50%) translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 600 + 400,
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                }).onfinish = () => {
                    particle.remove();
                };
            }
        }
    </script>
</body>
</html>

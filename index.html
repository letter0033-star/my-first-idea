        let lastIndex = 0; // Starts with "오늘도 힘내세요!" (index 0)
        let shuffledIndices = [];

        function fillShuffledIndices() {
            const indices = Array.from({ length: sentences.length }, (_, i) => i);
            // Fisher-Yates Shuffle
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            // Avoid duplicate across shuffle boundary (the next popped element is at indices.length - 1)
            if (indices[indices.length - 1] === lastIndex && indices.length > 1) {
                [indices[indices.length - 1], indices[0]] = [indices[0], indices[indices.length - 1]];
            }
            shuffledIndices = indices;
        }

        const buttonGradients = [
            { base: "linear-gradient(135deg, #ff7e47 0%, #e05e26 100%)", hover: "linear-gradient(135deg, #42342c 0%, #2e2520 100%)" }, // Orange to Dark Charcoal
            { base: "linear-gradient(135deg, #ff9233 0%, #ea580c 100%)", hover: "linear-gradient(135deg, #372b25 0%, #211915 100%)" }, // Bright Orange to Deep Charcoal
            { base: "linear-gradient(135deg, #f59e0b 0%, #d97706 100%)", hover: "linear-gradient(135deg, #451a03 0%, #30241e 100%)" }, // Soft Amber to Sienna
            { base: "linear-gradient(135deg, #f43f5e 0%, #be123c 100%)", hover: "linear-gradient(135deg, #3f0b18 0%, #27050e 100%)" }, // Rose to Dark Magenta
            { base: "linear-gradient(135deg, #ffa07a 0%, #e2583e 100%)", hover: "linear-gradient(135deg, #4a3429 0%, #2f2019 100%)" }, // Salmon to Chestnut
            { base: "linear-gradient(135deg, #f5b041 0%, #ca6f1e 100%)", hover: "linear-gradient(135deg, #3e2723 0%, #271714 100%)" }, // Gold to Bronze
            { base: "linear-gradient(135deg, #ff8c00 0%, #cd5c5c 100%)", hover: "linear-gradient(135deg, #3d2f2f 0%, #271c1c 100%)" }  // Dark Orange to Terracotta
        ];
        let lastColorIndex = 0;

        let audioCtx = null;

        function playClickSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                // Reuse a single global AudioContext instance to avoid hitting mobile browser limits
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }
                
                // Resume context if it has been suspended by the browser autoplay policy
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                const ctx = audioCtx;

                // 1. Noise transient (the plastic friction click)
                const bufferSize = ctx.sampleRate * 0.015; // 15ms of noise
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noiseNode = ctx.createBufferSource();
                noiseNode.buffer = buffer;

                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = 3500;
                noiseFilter.Q.value = 1.5;

                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.08, ctx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.015);

                noiseNode.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(ctx.destination);

                // 2. High-pitch contact (metallic switch click)
                const clickOsc = ctx.createOscillator();
                const clickGain = ctx.createGain();
                clickOsc.type = 'sine';
                clickOsc.frequency.setValueAtTime(1800, ctx.currentTime);
                clickOsc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.01);
                clickGain.gain.setValueAtTime(0.12, ctx.currentTime);
                clickGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.01);
                clickOsc.connect(clickGain);
                clickGain.connect(ctx.destination);

                // 3. Low-pitch bottom-out (keycap thock/clack resonance)
                const clackOsc = ctx.createOscillator();
                const clackGain = ctx.createGain();
                clackOsc.type = 'triangle';
                clackOsc.frequency.setValueAtTime(180, ctx.currentTime);
                clackOsc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.06);
                clackGain.gain.setValueAtTime(0.18, ctx.currentTime);
                clackGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
                clackOsc.connect(clackGain);
                clackGain.connect(ctx.destination);

                noiseNode.start();
                clickOsc.start();
                clackOsc.start();

                noiseNode.stop(ctx.currentTime + 0.015);
                clickOsc.stop(ctx.currentTime + 0.01);
                clackOsc.stop(ctx.currentTime + 0.06);
            } catch (e) {
                console.warn("AudioContext failed to play sound: ", e);
            }
        }

        function triggerCheer(event) {
            event.stopPropagation(); // Prevent event bubbling to card
            
            // Play mechanical keycap click sound
            playClickSound();
            
            const btn = document.getElementById('cheer-btn');
            const heading = document.getElementById('main-heading');
            
            // Button bounce effect
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 100);
            
            // Position for particle bursts
            const rect = btn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            createParticles(x, y);
            setTimeout(() => createParticles(x, y), 80);

            // Change button color
            let nextColorIndex;
            do {
                nextColorIndex = Math.floor(Math.random() * buttonGradients.length);
            } while (nextColorIndex === lastColorIndex);
            
            lastColorIndex = nextColorIndex;
            const nextColors = buttonGradients[nextColorIndex];
            btn.style.setProperty('--btn-gradient', nextColors.base);
            btn.style.setProperty('--btn-gradient-hover', nextColors.hover);

            // Change sentence with a smooth fade transition
            heading.classList.add('fade-out');
            
            setTimeout(() => {
                if (shuffledIndices.length === 0) {
                    fillShuffledIndices();
                }
                const nextIndex = shuffledIndices.pop();
                lastIndex = nextIndex;
                heading.textContent = sentences[nextIndex];
                heading.classList.remove('fade-out');
            }, 200);
        }

        function createParticles(x, y) {
            const colors = ['#ff7e47', '#ffa072', '#ffedd5', '#2e2520', '#ffd700'];
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.width = `${Math.random() * 8 + 4}px`;
                particle.style.height = particle.style.width;
                particle.style.borderRadius = '50%';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '999';
                
                // Random destination direction
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 80 + 40;
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity - 20; // pull slightly upwards

                document.body.appendChild(particle);

                // Animate via JS keyframes/transitions
                particle.animate([
                    { transform: 'translate(-50%, -50%) translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(-50%, -50%) translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 600 + 400,
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                }).onfinish = () => {
                    particle.remove();
                };
            }
        }

        function shareLink(event) {
            event.stopPropagation();
            const shareData = {
                title: '오늘도 힘내세요!',
                text: '지친 하루, 마음을 다독여줄 한마디를 만나보세요.',
                url: window.location.origin + window.location.pathname
            };
            
            if (navigator.share) {
                navigator.share(shareData)
                    .catch((err) => console.log('Share failed', err));
            } else {
                // Fallback: Copy to clipboard
                const shareUrl = window.location.origin + window.location.pathname;
                navigator.clipboard.writeText(shareUrl)
                    .then(() => {
                        showToast('링크가 복사되었습니다!');
                    })
                    .catch((err) => {
                        console.error('Could not copy text: ', err);
                    });
            }
        }

        function showToast(message) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // List of default/static community messages with simulated timestamps
        const defaultMessages = [
            {
                username: '인자한 교장선생님',
                avatar: 'avatar1.png',
                timestamp: Date.now() - 3600000 * 2, // 2 hours ago
                message: '각자의 자리에서 묵묵히 교육의 참뜻을 실천하고 계시는 우리 선생님들과 모든 교직원 여러분, 당신들의 선한 헌신이 있기에 우리 아이들과 세상이 더욱 따뜻하게 빛납니다. 진심으로 감사하고 응원합니다.'
            },
            {
                username: '열정 가득한 교감선생님',
                avatar: 'avatar2.png',
                timestamp: Date.now() - 3600000 * 5, // 5 hours ago
                message: '보이지 않는 곳에서도 온 마음을 다해 하루를 지켜내시는 모든 교육 가족분들, 지치는 순간 속에서도 웃음을 잃지 않고 헌신하시는 여러분의 매 순간이 곧 기적입니다. 오늘 하루도 고생 많으셨습니다!'
            }
        ];

        // Format relative time helper
        function formatRelativeTime(timestamp) {
            if (!timestamp) return '방금 전';
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (minutes < 1) return '방금 전';
            if (minutes < 60) return `${minutes}분 전`;
            if (hours < 24) return `${hours}시간 전`;
            return `${days}일 전`;
        }

        // Live messages from Firebase
        let firebaseMessages = [];

        // Debug logger helper
        function logDebug(msg, isError = false) {
            console.log(msg);
            const logsDiv = document.getElementById('debug-logs');
            if (logsDiv) {
                const color = isError ? '#ff4d4d' : '#00ffcc';
                logsDiv.innerHTML += `<span style="color: ${color};">[${new Date().toLocaleTimeString()}]</span> ${msg}<br>`;
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }
        }

        // Dynamic Firebase Realtime Database auto-probing
        async function initFirebaseDb() {
            logDebug("Firebase DB 연동 작업 시작...");
            try {
                // Import SDK function dynamically
                const { getDatabase, ref, push, onValue } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
                
                const usUrl = "https://my-first-idea-23d72-default-rtdb.firebaseio.com";
                const sgUrl = "https://my-first-idea-23d72-default-rtdb.asia-southeast1.firebasedatabase.app";
                
                let selectedUrl = usUrl;
                logDebug("리전별 데이터베이스 존재 여부 분석 중...");
                
                try {
                    const resSg = await fetch(sgUrl + "/.json?shallow=true", { method: 'GET' });
                    const resUs = await fetch(usUrl + "/.json?shallow=true", { method: 'GET' });
                    
                    logDebug(`SG 응답 코드: ${resSg.status}, US 응답 코드: ${resUs.status}`);
                    
                    // Since fetch does not throw for 404, we check status. Active DB will return 200 (ok) or 401/403 (rules active)
                    const isActive = (status) => status === 200 || status === 401 || status === 403;
                    
                    if (isActive(resSg.status)) {
                        selectedUrl = sgUrl;
                        logDebug("싱가포르(asia-southeast1) 데이터베이스가 활성화되어 있습니다!");
                    } else if (isActive(resUs.status)) {
                        selectedUrl = usUrl;
                        logDebug("미국(firebaseio.com) 데이터베이스가 활성화되어 있습니다!");
                    } else {
                        logDebug("활성화된 리전을 식별할 수 없습니다. 싱가포르 리전을 기본값으로 사용해 연결을 시도합니다.");
                        selectedUrl = sgUrl;
                    }
                } catch(e) {
                    logDebug("네트워크 검사 실패 (CORS/차단): " + e.message, true);
                    logDebug("안전한 연결을 위해 싱가포르 리전을 기본값으로 설정합니다.");
                    selectedUrl = sgUrl;
                }
                
                logDebug("접속 대상 URL: " + selectedUrl);
                db = getDatabase(app, selectedUrl);
                messagesRef = ref(db, 'messages');
                
                logDebug("데이터베이스 리스너 가동 중...");
                
                // Real-time synchronization
                onValue(messagesRef, (snapshot) => {
                    logDebug("실시간 데이터베이스로부터 데이터를 성공적으로 수신했습니다!");
                    const data = snapshot.val();
                    const loaded = [];
                    if (data) {
                        Object.keys(data).forEach(key => {
                            loaded.push(data[key]);
                        });
                        // Sort by timestamp descending (newest first)
                        loaded.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    }
                    firebaseMessages = loaded;
                    renderFeed();
                }, (error) => {
                    console.error("Firebase Database read failed: ", error);
                    logDebug("데이터베이스 읽기 권한 실패: " + error.message, true);
                    showToast('데이터베이스 권한 규칙(Rules)을 확인해 주세요.');
                });
            } catch (err) {
                console.error("Firebase DB init failed: ", err);
                logDebug("파이어베이스 초기화 치명적 에러: " + err.message, true);
            }
        }

        // Render feed function
        function renderFeed() {
            const feedContainer = document.getElementById('message-feed-container');
            if (!feedContainer) return;
            
            feedContainer.innerHTML = '';
            
            // Merge custom firebase messages with default messages
            const allMessages = [...firebaseMessages, ...defaultMessages];
            
            allMessages.forEach(item => {
                const feedItem = document.createElement('div');
                feedItem.classList.add('feed-item');
                feedItem.style.animation = 'fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                
                const timeText = formatRelativeTime(item.timestamp);
                
                feedItem.innerHTML = `
                    <img src="${item.avatar}" alt="${item.username}" class="feed-avatar">
                    <div class="feed-content">
                        <div class="feed-header">
                            <span class="feed-username">${item.username}</span>
                            <span class="feed-time">${timeText}</span>
                        </div>
                        <p class="feed-message">${item.message}</p>
                    </div>
                `;
                feedContainer.appendChild(feedItem);
            });
        }

        // Save new message function
        async function saveMessage(event) {
            event.preventDefault();
            event.stopPropagation();
            
            // Play keycap click sound
            playClickSound();
            
            const nameInput = document.getElementById('writer-name');
            const roleSelect = document.getElementById('writer-role');
            const messageInput = document.getElementById('writer-message');
            
            const name = nameInput.value.trim();
            const message = messageInput.value.trim();
            
            if (!name) {
                showToast('닉네임 또는 이름을 입력해 주세요!');
                nameInput.focus();
                return;
            }
            if (!message) {
                showToast('응원 메시지 내용을 입력해 주세요!');
                messageInput.focus();
                return;
            }
            
            // Determine avatar based on role
            const role = roleSelect.value;
            let avatar = 'avatar2.png'; // default
            if (['teacher', 'vicemaster', 'master'].includes(role)) {
                avatar = 'avatar1.png';
            }
            
            // Create role display name
            const roleLabels = {
                teacher: '선생님',
                vicemaster: '교감선생님',
                master: '교장선생님',
                parent: '학부모',
                student: '학생',
                citizen: '응원하는 시민'
            };
            const roleLabel = roleLabels[role] || '선생님';
            const displayName = `${name} (${roleLabel})`;
            
            const newMessage = {
                username: displayName,
                avatar: avatar,
                timestamp: Date.now(),
                message: message
            };
            
            if (messagesRef) {
                const { push } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
                push(messagesRef, newMessage)
                    .then(() => {
                        // Clear inputs
                        messageInput.value = '';
                        nameInput.value = '';
                        
                        // Show success toast
                        showToast('따뜻한 응원이 등록되었습니다!');
                        
                        // Add subtle particle effect around the save button
                        const rect = event.target.getBoundingClientRect();
                        createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
                    })
                    .catch((err) => {
                        console.error("Firebase push failed: ", err);
                        logDebug("데이터 전송 실패: " + err.message, true);
                        showToast('등록에 실패했습니다. DB 규칙(Rules)을 확인해 주세요.');
                    });
            } else {
                logDebug("연결 실패: messagesRef가 정의되지 않았습니다.", true);
                showToast('데이터베이스에 연결하는 중입니다. 잠시 후 다시 시도해 주세요.');
            }
        }

        // Initialize feed and database on page load
        window.addEventListener('DOMContentLoaded', () => {
            renderFeed();
            initFirebaseDb();
        });

        // Expose functions globally for inline HTML event handlers
        window.createRipple = createRipple;
        window.triggerCheer = triggerCheer;
        window.saveMessage = saveMessage;
        window.shareLink = shareLink;
    </script>
